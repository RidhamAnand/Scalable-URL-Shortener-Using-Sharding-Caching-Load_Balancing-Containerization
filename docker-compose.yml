version: "3.9"

services:

  redis:
    image: redis:7-alpine
    container_name: url-shortener-redis
   
    volumes:
      - redis_data:/data


  mongo_a:
    image: mongo:7
    container_name: mongo_a
    
    volumes:
      - mongo_a_data:/data/db


  mongo_b:
    image: mongo:7
    container_name: mongo_b
    
    volumes:
      - mongo_b_data:/data/db


  mongo_c:
    image: mongo:7
    container_name: mongo_c
    
    volumes:
      - mongo_c_data:/data/db


  mongo_d:
    image: mongo:7
    container_name: mongo_d
    
    volumes:
      - mongo_d_data:/data/db

  url_creation_service_a:
    build: ./services/url_creation_service
    image: url_shortener_service:latest
    container_name: url_creation_service_a
    
    environment:
      - MACHINE_ID=a
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_A_URL=mongodb://mongo_a:27017
      - MONGO_B_URL=mongodb://mongo_b:27017
      - MONGO_C_URL=mongodb://mongo_c:27017
      - MONGO_D_URL=mongodb://mongo_d:27017
    depends_on:
      - redis
      - mongo_a
      - mongo_b
      - mongo_c
      - mongo_d


  url_creation_service_b:
    image: url_shortener_service:latest
    container_name: url_creation_service_b
    
    environment:
      - MACHINE_ID=b
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_A_URL=mongodb://mongo_a:27017
      - MONGO_B_URL=mongodb://mongo_b:27017
      - MONGO_C_URL=mongodb://mongo_c:27017
      - MONGO_D_URL=mongodb://mongo_d:27017
    depends_on:
      - redis


  url_creation_service_c:
    image: url_shortener_service:latest
    container_name: url_creation_service_c
    
    environment:
      - MACHINE_ID=c
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_A_URL=mongodb://mongo_a:27017
      - MONGO_B_URL=mongodb://mongo_b:27017
      - MONGO_C_URL=mongodb://mongo_c:27017
      - MONGO_D_URL=mongodb://mongo_d:27017


  url_creation_service_d:
    image: url_shortener_service:latest
    container_name: url_creation_service_d
   
    environment:
      - MACHINE_ID=d
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_A_URL=mongodb://mongo_a:27017
      - MONGO_B_URL=mongodb://mongo_b:27017
      - MONGO_C_URL=mongodb://mongo_c:27017
      - MONGO_D_URL=mongodb://mongo_d:27017

  url_redirect_service:
    build: ./services/url_redirect_service
    container_name: url_redirect_service
    
    environment:
      - ENABLE_REDIS_CACHE=${ENABLE_REDIS_CACHE:-true}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_A_URL=mongodb://mongo_a:27017
      - MONGO_B_URL=mongodb://mongo_b:27017
      - MONGO_C_URL=mongodb://mongo_c:27017
      - MONGO_D_URL=mongodb://mongo_d:27017
    depends_on:
      - redis
      - mongo_a
      - mongo_b
      - mongo_c
      - mongo_d

  load_balancer:
    image: nginx:alpine
    container_name: url_shortener_lb
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - url_creation_service_a
      - url_creation_service_b
      - url_creation_service_c
      - url_creation_service_d
      - url_redirect_service

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: url_shortener_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - url_creation_service_a
      - url_creation_service_b
      - url_creation_service_c
      - url_creation_service_d
      - url_redirect_service

  grafana:
    image: grafana/grafana:11.2.2
    container_name: url_shortener_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infrastructure/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus



volumes:
  redis_data:
  mongo_a_data:
  mongo_b_data:
  mongo_c_data:
  mongo_d_data:
  prometheus_data:
  grafana_data: