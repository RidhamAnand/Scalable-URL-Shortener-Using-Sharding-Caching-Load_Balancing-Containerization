version: "3.9"

services:

  redis:
    image: redis:7-alpine
    container_name: url-shortener-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data


  mongo_a:
    image: mongo:7
    container_name: mongo_a
    ports:
      - "27021:27017"
    volumes:
      - mongo_a_data:/data/db


  mongo_b:
    image: mongo:7
    container_name: mongo_b
    ports:
      - "27022:27017"
    volumes:
      - mongo_b_data:/data/db


  mongo_c:
    image: mongo:7
    container_name: mongo_c
    ports:
      - "27023:27017"
    volumes:
      - mongo_c_data:/data/db


  mongo_d:
    image: mongo:7
    container_name: mongo_d
    ports:
      - "27024:27017"
    volumes:
      - mongo_d_data:/data/db

  url_creation_service_a:
    build: ./services/url_creation_service
    image: url_shortener_service:latest
    container_name: url_creation_service_a
    ports:
      - "8000:8000"
    environment:
      - MACHINE_ID=a
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_A_URL=mongodb://mongo_a:27017
      - MONGO_B_URL=mongodb://mongo_b:27017
      - MONGO_C_URL=mongodb://mongo_c:27017
      - MONGO_D_URL=mongodb://mongo_d:27017
    depends_on:
      - redis
      - mongo_a
      - mongo_b
      - mongo_c
      - mongo_d


  url_creation_service_b:
    image: url_shortener_service:latest
    container_name: url_creation_service_b
    ports:
      - "8001:8000"
    environment:
      - MACHINE_ID=b
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_A_URL=mongodb://mongo_a:27017
      - MONGO_B_URL=mongodb://mongo_b:27017
      - MONGO_C_URL=mongodb://mongo_c:27017
      - MONGO_D_URL=mongodb://mongo_d:27017
    depends_on:
      - redis


  url_creation_service_c:
    image: url_shortener_service:latest
    container_name: url_creation_service_c
    ports:
      - "8002:8000"
    environment:
      - MACHINE_ID=c
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_A_URL=mongodb://mongo_a:27017
      - MONGO_B_URL=mongodb://mongo_b:27017
      - MONGO_C_URL=mongodb://mongo_c:27017
      - MONGO_D_URL=mongodb://mongo_d:27017


  url_creation_service_d:
    image: url_shortener_service:latest
    container_name: url_creation_service_d
    ports:
      - "8003:8000"
    environment:
      - MACHINE_ID=d
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_A_URL=mongodb://mongo_a:27017
      - MONGO_B_URL=mongodb://mongo_b:27017
      - MONGO_C_URL=mongodb://mongo_c:27017
      - MONGO_D_URL=mongodb://mongo_d:27017

  url_redirect_service:
    build: ./services/url_redirect_service
    container_name: url_redirect_service
    ports:
      - "8004:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_A_URL=mongodb://mongo_a:27017
      - MONGO_B_URL=mongodb://mongo_b:27017
      - MONGO_C_URL=mongodb://mongo_c:27017
      - MONGO_D_URL=mongodb://mongo_d:27017
    depends_on:
      - redis
      - mongo_a
      - mongo_b
      - mongo_c
      - mongo_d


volumes:
  redis_data:
  mongo_a_data:
  mongo_b_data:
  mongo_c_data:
  mongo_d_data: